repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
        args: [--check]

  - repo: local
    hooks:
      - id: cargo-check
        name: cargo check (native/rust)
        entry: cargo check --manifest-path native/rust/Cargo.toml --all-targets
        language: system
        pass_filenames: false
        files: ^native/rust/(Cargo\.toml|Cargo\.lock|src/.*\.rs)$
