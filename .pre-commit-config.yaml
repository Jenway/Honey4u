repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
        args: [--check]

  - repo: local
    hooks:
      - id: ty-check
        name: ty check
        entry: uv run ty check
        language: system
        pass_filenames: false
        files: ^(pyproject\.toml|src/.*\.py|tests/.*\.py)$

      - id: cargo-fmt-check
        name: cargo fmt --check (native/rust)
        entry: cargo fmt --manifest-path native/rust/Cargo.toml --all --check
        language: system
        pass_filenames: false
        files: ^native/rust/(Cargo\.toml|Cargo\.lock|src/.*\.rs)$

      - id: cargo-clippy
        name: cargo clippy (native/rust)
        entry: cargo clippy --manifest-path native/rust/Cargo.toml --all-targets -- -D warnings
        language: system
        pass_filenames: false
        files: ^native/rust/(Cargo\.toml|Cargo\.lock|src/.*\.rs)$
